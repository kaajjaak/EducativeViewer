# ──────────────────────────────────────────────────────────────────────────────
# Automated Vercel deployment — triggered when a GitHub Release is published
# or an existing release is updated.
#
# HOW IT WORKS:
#   1. Create a new Release in GitHub (any tag).
#   2. Upload your .next.zip as a release asset (any *.zip name works).
#   3. Publish the release — this workflow fires automatically.
#      Updating an existing release (for example uploading a new zip asset)
#      also fires this workflow.
#   4. The zip is downloaded, extracted into nextBuild/, paths are patched,
#      and the result is deployed to Vercel.
#
# REQUIRED SETUP (one-time, in GitHub repo Settings → Secrets and variables → Actions)
#
# ┌─ Secrets (sensitive) ────────────────────────────────────────────────────┐
# │  VERCEL_TOKEN       Personal Access Token                                │
# │                     Create at: https://vercel.com/account/tokens         │
# └──────────────────────────────────────────────────────────────────────────┘
#
# ┌─ Variables (not sensitive, visible in logs) ─────────────────────────────┐
# │  VERCEL_ORG_ID      Your team/personal account ID                        │
# │  VERCEL_PROJECT_ID  The specific Vercel project to deploy to             │
# │                                                                           │
# │  How to find these values:                                                │
# │    1. Run `vercel link` locally and link to the target project            │
# │    2. Open the generated .vercel/project.json file                        │
# │    3. Copy "orgId"  → VERCEL_ORG_ID                                       │
# │       Copy "projectId" → VERCEL_PROJECT_ID                               │
# │                                                                           │
# │  Alternatively, visit vercel.com → Project Settings → General            │
# │  and copy the Project ID shown at the bottom of the page.                │
# └──────────────────────────────────────────────────────────────────────────┘
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Vercel

on:
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.0.1)'
        required: true

jobs:
  deploy:
    name: Prepare & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Vercel CLI
        id: cache-vercel-cli
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: vercel-cli-${{ runner.os }}-${{ hashFiles('client/package.json') }}
          restore-keys: vercel-cli-${{ runner.os }}-

      - name: Install Vercel CLI
        if: steps.cache-vercel-cli.outputs.cache-hit != 'true'
        run: |
          npm config set prefix ~/.npm-global
          npm install -g vercel@latest

      - name: Add Vercel CLI to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Validate Vercel target IDs
        run: |
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "[ERROR] Missing VERCEL_ORG_ID. Add it in GitHub repo Variables."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "[ERROR] Missing VERCEL_PROJECT_ID. Add it in GitHub repo Variables."
            exit 1
          fi

      - name: Link to existing Vercel project
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF
          echo "[+] Linked to existing project: $VERCEL_PROJECT_ID"

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      # Download the first *.zip asset attached to the release into client/.
      # The GitHub CLI (gh) is pre-installed on all GitHub-hosted runners.
      - name: Download release zip
        run: gh release download "${{ steps.tag.outputs.value }}" --pattern "*.zip" --output .next.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      # Runs prepare-deploy.js:
      #   1. Extracts client/.next.zip → client/nextBuild/
      #   2. Patches required-server-files.json paths
      #   3. Writes vercel.json + .vercelignore
      - name: Prepare build output
        run: node prepare-deploy.js

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
